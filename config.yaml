# config.yaml — execution configuration for media-organizer
#
# Usage:
#   axolo run --config config.yaml
#   axolo run --config config.yaml --dry-run   # CLI flags take precedence

# ── Paths ──────────────────────────────────────────────────────────────────────
source: data/House2
destination: data/Organized

# ── Action ─────────────────────────────────────────────────────────────────────
# move | copy | link
action: move

# ── Routing by category ────────────────────────────────────────────────────────
# Defines which folder template (and optionally filename template) applies to each type.
# Valid keys: photos, videos, 360-photos, 360-videos, music, documents, hidden, others
# Available folder templates: see DEFAULT_TEMPLATES in templates.py
#   year_month_cap       → 2026/Abril
#   year_month           → 2026/04
#   year_month_name      → 2026/abril
#   year_month_name_day  → 2026/Abril/Abril 15
#   music_genre          → rock
#   music_genre_artist   → rock/the-beatles
#   camera               → canon/eos-r5/2026/04
#   (or any custom template with placeholders)

profiles:
  - name: photos
    template: year_month_cap
    # Result: Photos/2026/Abril/photo.jpg

  - name: videos
    template: year_month_cap
    # Result: Videos/2026/Abril/video.mp4

  - name: 360-photos
    template: year_month_cap
    # Result: 360/Photos/2026/Abril/img.insp

  - name: 360-videos
    template: year_month_cap
    # Result: 360/Videos/2026/Abril/vid.insv

  - name: music
    template: music_genre
    filename_template: "{music_artist} - {music_title}"
    # Result: Music/rock/the-beatles - let-it-be.mp3

  - name: documents
    template: year_month_cap
    # Result: Documents/2026/Abril/contract.pdf

  # - name: hidden
  #   template: year_month_cap
  #   # Result: Hidden/2026/Abril/.DS_Store
  #   # Requires --include-hidden for the scanner to detect them.

  # - name: others
  #   template: year_month_cap
  #   # Result: Others/2026/Abril/archive.zip

# ── Options ────────────────────────────────────────────────────────────────────
dry_run: false
recursive: true
follow_symlinks: false
# include_hidden: false   # Enable to organize hidden files (names starting with '.')

# ── Extra variables for templates that require them ───────────────────────────
# extra:
#   evento: Wedding2026
